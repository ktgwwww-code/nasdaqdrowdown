name: NASDAQ100 Drawdown Monitor

on:
  schedule:
    # UTC 0:00 = 日本 9:00（米国前営業日の引け後）。実行日基準で火〜土。
    # 終値が取れているかをテストして時刻は調整する。
    - cron: "0 0 * * 2-6"
  workflow_dispatch: {}  # 手動実行も可能にする

permissions:
  contents: write  # state.json をコミット＆プッシュするため

concurrency:
  group: ndx-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python monitor.py

      - name: Commit state if changed
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "state.json に変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state.json [skip ci]"
          # 別の実行がリモートを先行させていても落ちないよう、
          # push を最大5回までリトライ（失敗時は rebase してから再試行）。
          for i in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "push 成功（$i 回目）"
              exit 0
            fi
            echo "push 失敗（$i 回目）。rebase して再試行..."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            sleep $((i * 2))
          done
          echo "::error::state.json の push に5回失敗しました"
          exit 1
